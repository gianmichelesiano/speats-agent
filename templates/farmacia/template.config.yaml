# Template Config: Farmacia
# Template version: 1.1.0
# Usare con: speats-agent/scripts/create-agent.sh

template:
  name: farmacia
  version: 1.1.0
  description: "Agente AI per farmacie svizzere"

model:
  provider: deepseek
  default: deepseek-v4-flash
  fallback: openai/gpt-4o-mini

# ─── Skills da installare ──────────────────────────────────
skills:
  required:
    - pharmacy-ai-assistant
    - swiss-pharma-database
  recommended:
    - obsidian
    - google-workspace
    - nano-pdf

# ─── MCP ────────────────────────────────────────────────────
mcp_servers:
  enabled: false

# ─── Gateway ────────────────────────────────────────────────
gateway:
  enabled: true
  telegram_bot: true

# ─── Cron job predefiniti ──────────────────────────────────
cron:
  - schedule: "0 8 * * *"
    prompt: "Controlla scadenze farmaci nei prossimi 30 giorni."
    deliver: origin

# ─── Sicurezza ──────────────────────────────────────────────
# L'agente cliente NON deve poter modificare se stesso o eseguire comandi.
security:
  disabled_toolsets:
    - terminal
    - skill_manage
    - write_file
    - patch
    - cronjob
    - process
    - delegate_task
    - ha_call_service
    - ha_get_state
    - ha_list_entities
    - ha_list_services

# ─── File template ─────────────────────────────────────────
files:
  soul: SOUL.md
  onboarding: onboarding.md
  cron: cron.md
