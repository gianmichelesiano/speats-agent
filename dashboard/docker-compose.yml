services:
  postgres:
    image: postgres:17-alpine
    container_name: speats-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: speats
      POSTGRES_USER: speats
      POSTGRES_PASSWORD: speats
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - speats_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U speats -d speats"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  speats_postgres_data:
